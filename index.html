<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Vacacionate SAC — Analizador Financiero v3.0 (Moneda + Bancos)</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap');
  :root {
    --bg:#0D1117;--surface:#161B22;--surface2:#1C2330;--border:#30363D;
    --accent:#2EA043;--accent2:#1F6FEB;--warn:#E3B341;--danger:#F85149;
    --purple:#8957E5;--text:#E6EDF3;--muted:#7D8590;--card:#21262D;
    --completo:#2EA043;--parcial:#E3B341;--pendiente:#F85149;--excedente:#8957E5;
    --critica:#F85149;--alta:#FF9500;--media:#E3B341;--baja:#2EA043;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;}
  .app-header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:12px;}
  .logo{width:36px;height:36px;background:linear-gradient(135deg,#2EA043,#1F6FEB);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Space Mono';font-size:15px;font-weight:700;color:#fff;}
  .app-title{font-size:16px;font-weight:700;letter-spacing:-.3px;}
  .app-subtitle{font-size:11px;color:var(--muted);}
  .app-sub{font-size:12px;color:var(--muted);margin-left:auto;font-family:'Space Mono';}
  .tabs{display:flex;gap:2px;background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;overflow-x:auto;}
  .tab{padding:10px 16px;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s;}
  .tab:hover{color:var(--text);}
  .tab.active{color:var(--text);border-bottom-color:var(--accent2);}
  .tab.disabled{opacity:.35;pointer-events:none;}
  .main{padding:24px;max-width:1500px;margin:0 auto;}
  .upload-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}
  .upload-zone{background:var(--card);border:1.5px dashed var(--border);border-radius:12px;padding:20px;transition:border-color .2s;}
  .upload-zone:hover{border-color:var(--accent2);}
  .upload-zone.has-files{border-style:solid;border-color:var(--accent);}
  .uz-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:8px;}
  .uz-title{font-size:14px;font-weight:600;margin-bottom:4px;}
  .uz-desc{font-size:12px;color:var(--muted);margin-bottom:12px;}
  .uz-btn{display:inline-flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:7px 14px;font-size:12px;font-weight:500;cursor:pointer;color:var(--text);transition:background .15s;}
  .uz-btn:hover{background:var(--border);}
  .file-list{margin-top:10px;display:flex;flex-direction:column;gap:4px;}
  .file-item{display:flex;align-items:center;gap:6px;background:var(--surface2);border-radius:6px;padding:5px 8px;font-size:11px;}
  .file-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--accent);font-family:'Space Mono';}
  .file-rm{color:var(--danger);cursor:pointer;font-size:14px;line-height:1;}
  .file-rm:hover{opacity:.7;}
  .analyze-wrap{margin-top:20px;text-align:center;}
  .analyze-btn{background:linear-gradient(135deg,#1F6FEB,#2EA043);border:none;border-radius:10px;padding:14px 40px;font-size:15px;font-weight:700;color:#fff;cursor:pointer;font-family:'DM Sans';letter-spacing:-.2px;transition:opacity .2s,transform .1s;}
  .analyze-btn:hover{opacity:.9;transform:translateY(-1px);}
  .analyze-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
  .error-msg{color:var(--danger);font-size:13px;margin-top:10px;text-align:center;background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.3);border-radius:8px;padding:8px 16px;}
  .loading-indicator{margin-top:12px;color:var(--muted);font-size:13px;text-align:center;}
  .spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent2);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .kpi-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:20px;}
  .kpi-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;}
  .kpi-label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;}
  .kpi-value{font-size:22px;font-weight:700;font-family:'Space Mono';letter-spacing:-1px;}
  .kpi-sub{font-size:11px;color:var(--muted);margin-top:3px;}
  .kpi-card.green{border-left:3px solid var(--completo);}
  .kpi-card.yellow{border-left:3px solid var(--parcial);}
  .kpi-card.red{border-left:3px solid var(--pendiente);}
  .kpi-card.blue{border-left:3px solid var(--accent2);}
  .kpi-card.purple{border-left:3px solid var(--purple);}
  .kpi-card.orange{border-left:3px solid var(--alta);}
  .status-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px;}
  .stat-card{border-radius:10px;padding:14px 16px;}
  .stat-card.completo{background:rgba(46,160,67,.12);border:1px solid rgba(46,160,67,.3);}
  .stat-card.parcial{background:rgba(227,179,65,.12);border:1px solid rgba(227,179,65,.3);}
  .stat-card.pendiente{background:rgba(248,81,73,.12);border:1px solid rgba(248,81,73,.3);}
  .stat-card.excedente{background:rgba(137,87,229,.12);border:1px solid rgba(137,87,229,.3);}
  .stat-n{font-size:28px;font-weight:700;font-family:'Space Mono';}
  .stat-label{font-size:12px;color:var(--muted);}
  .charts-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;}
  .chart-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;}
  .chart-title{font-size:13px;font-weight:600;color:var(--muted);margin-bottom:14px;text-transform:uppercase;letter-spacing:.6px;}
  canvas{max-height:220px;}
  .table-controls{display:flex;gap:10px;margin-bottom:14px;align-items:center;flex-wrap:wrap;}
  .search-input{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:13px;color:var(--text);width:280px;font-family:'DM Sans';outline:none;}
  .search-input:focus{border-color:var(--accent2);}
  .filter-select{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:13px;color:var(--text);font-family:'DM Sans';outline:none;cursor:pointer;}
  .export-btn{margin-left:auto;display:flex;align-items:center;gap:6px;background:var(--accent);border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:600;color:#fff;cursor:pointer;font-family:'DM Sans';transition:opacity .2s;}
  .export-btn:hover{opacity:.85;}
  .export-btn.secondary{background:var(--accent2);}
  .export-btn.purple{background:var(--purple);}
  .count-badge{font-size:12px;color:var(--muted);}
  .tbl-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--border);}
  table{width:100%;border-collapse:collapse;font-size:12px;}
  thead th{background:var(--surface2);color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.6px;font-size:10px;padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none;}
  thead th:hover{color:var(--text);}

  tbody tr:hover{background:var(--surface2);}
  tbody td{padding:9px 12px;color:var(--text);white-space:nowrap;max-width:200px;overflow:hidden;text-overflow:ellipsis;}
  .mono{font-family:'Space Mono';font-size:11px;}
  .num{text-align:right;font-family:'Space Mono';font-size:11px;}
  .badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.3px;}
  .badge.completo{background:rgba(46,160,67,.2);color:#56d364;}
  .badge.parcial{background:rgba(227,179,65,.2);color:#e3b341;}
  .badge.pendiente{background:rgba(248,81,73,.2);color:#f85149;}
  .badge.excedente{background:rgba(137,87,229,.2);color:#a371f7;}
  .badge.revisar{background:rgba(255,150,50,.2);color:#ffa657;}
  .badge.critica{background:rgba(248,81,73,.25);color:#ff6b62;border:1px solid rgba(248,81,73,.4);}
  .badge.alta{background:rgba(255,149,0,.2);color:#ffa657;}
  .badge.media{background:rgba(227,179,65,.2);color:#e3b341;}
  .badge.baja{background:rgba(46,160,67,.2);color:#56d364;}
  .badge.perdida{background:rgba(248,81,73,.3);color:#fff;border:1px solid var(--danger);animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.6;}}
  .neg{color:var(--danger)!important;}
  .pos{color:var(--completo)!important;}
  .section-title{font-size:18px;font-weight:700;letter-spacing:-.4px;margin-bottom:16px;}
  .section-sub{font-size:13px;color:var(--muted);margin-top:-10px;margin-bottom:16px;}
  .tbl-scroll{max-height:600px;overflow-y:auto;}
  .tbl-scroll thead th{position:sticky;top:0;z-index:2;}
  tfoot td{background:var(--surface2);font-weight:700;border-top:2px solid var(--border);padding:9px 12px;font-family:'Space Mono';font-size:11px;}
  .aging-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px;}
  .aging-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center;}
  .aging-card.b0{border-top:3px solid #56d364;}
  .aging-card.b1{border-top:3px solid #e3b341;}
  .aging-card.b2{border-top:3px solid #ffa657;}
  .aging-card.b3{border-top:3px solid #f85149;}
  .aging-card.b4{border-top:3px solid #c9302c;}
  .aging-card .aging-label{font-size:11px;color:var(--muted);font-weight:600;}
  .aging-card .aging-count{font-size:24px;font-weight:700;font-family:'Space Mono';margin:6px 0 2px;}
  .aging-card .aging-amount{font-size:11px;color:var(--muted);font-family:'Space Mono';}
  /* trazabilidad */
  .traz-layout{display:grid;grid-template-columns:340px 1fr;gap:20px;}
  .traz-list{background:var(--card);border:1px solid var(--border);border-radius:10px;max-height:680px;overflow-y:auto;}
  .traz-item{padding:11px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;}
  .traz-item:hover{background:var(--surface2);}
  .traz-item.active{background:var(--surface2);border-left:3px solid var(--accent2);}
  .traz-item .ti-file{font-family:'Space Mono';font-size:12px;color:var(--accent2);font-weight:600;}
  .traz-item .ti-name{font-size:11px;color:var(--text);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .traz-item .ti-meta{display:flex;justify-content:space-between;margin-top:4px;font-size:10px;color:var(--muted);font-family:'Space Mono';}
  .traz-item .ti-pend{color:var(--danger);font-weight:700;}
  .traz-detail{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px;}
  .traz-empty{text-align:center;padding:60px 20px;color:var(--muted);}
  .traz-head{display:flex;align-items:center;gap:14px;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--border);flex-wrap:wrap;}
  .traz-head .th-file{font-size:22px;font-weight:700;font-family:'Space Mono';color:var(--accent2);}
  .traz-head .th-name{font-size:14px;color:var(--text);}
  .traz-head .th-meta{color:var(--muted);font-size:12px;}
  .traz-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px;}
  .ts-card{background:var(--surface2);border-radius:8px;padding:12px;}
  .ts-card .ts-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;}
  .ts-card .ts-value{font-size:16px;font-weight:700;font-family:'Space Mono';margin-top:4px;}
  .traz-timeline{margin-top:8px;}
  .tl-section{margin-bottom:18px;}
  .tl-title{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px;display:flex;align-items:center;gap:8px;}
  .tl-row{display:grid;grid-template-columns:90px 100px 100px 1fr 1fr;gap:10px;padding:8px 10px;border-radius:6px;font-size:11px;background:var(--surface2);margin-bottom:4px;font-family:'Space Mono';}
  .tl-row.empty{color:var(--muted);text-align:center;padding:16px;background:transparent;}
  .tl-row .tl-amt{text-align:right;font-weight:600;}
  .tl-row .tl-amt.ing{color:var(--completo);}
  .tl-row .tl-amt.eg{color:var(--danger);}
  .pill{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;background:var(--surface2);color:var(--muted);}
  .crit-bar{display:flex;align-items:center;gap:8px;}
  .crit-bar .cb-fill{height:6px;border-radius:3px;background:linear-gradient(90deg,#2EA043,#E3B341,#FF9500,#F85149);}
  .help-tip{background:rgba(31,111,235,.08);border:1px solid rgba(31,111,235,.25);border-radius:8px;padding:12px 14px;margin-bottom:16px;font-size:12px;color:var(--text);}
  .help-tip strong{color:var(--accent2);}
  .badge.usd{background:rgba(31,111,235,.2);color:#58a6ff;}
  .badge.pen{background:rgba(227,179,65,.2);color:#e3b341;}
  .badge.banco{background:rgba(137,87,229,.15);color:#a371f7;border:1px solid rgba(137,87,229,.25);}
  .banco-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
  .banco-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;}
  .banco-name{font-size:13px;font-weight:700;margin-bottom:6px;}
  .banco-stats{display:flex;gap:10px;font-size:11px;color:var(--muted);font-family:'Space Mono';}
  .moneda-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
  @media(max-width:1100px){.traz-layout{grid-template-columns:1fr;}}
  @media(max-width:900px){.upload-grid{grid-template-columns:1fr;}.kpi-grid{grid-template-columns:repeat(2,1fr);}.charts-row{grid-template-columns:1fr;}.status-grid{grid-template-columns:repeat(2,1fr);}.aging-grid{grid-template-columns:repeat(2,1fr);}.banco-grid{grid-template-columns:repeat(2,1fr);}}
</style>
</head>
<body>
<div class="app-header">
  <div class="logo">V</div>
  <div>
    <div class="app-title">Vacacionate SAC — Analizador Financiero</div>
    <div class="app-subtitle">v3.0 Controller Edition · Moneda USD/PEN · Bancos · Trazabilidad · Aging</div>
  </div>
  <div class="app-sub">Dashboard Dinámico Exportable</div>
</div>
<div class="tabs" id="tabs">
  <div class="tab active" data-tab="upload">📁 Cargar Archivos</div>
  <div class="tab disabled" data-tab="dashboard">📊 Dashboard</div>
  <div class="tab disabled" data-tab="cruce">📋 Cruce Completo</div>
  <div class="tab disabled" data-tab="trazabilidad">🔍 Trazabilidad</div>
  <div class="tab disabled" data-tab="criticos">🚨 Críticos / Aging</div>
  <div class="tab disabled" data-tab="rentabilidad">💰 Rentabilidad</div>
  <div class="tab disabled" data-tab="completos">✅ Completos</div>
  <div class="tab disabled" data-tab="pendientes">⏳ Pendientes</div>
  <div class="tab disabled" data-tab="bancos">💳 Bancos / Monedas</div>
  <div class="tab disabled" data-tab="egresos">💸 Egresos</div>
</div>
<div class="main" id="main-content"></div>

<script>
/* ============================================================
   STATE
   ============================================================ */
let state = {
  files: { maestro: null, ingresos: [], egresos: [] },
  result: null,
  tab: 'upload',
  filter: 'ALL',
  search: '',
  selectedFile: null,
  sortKey: null,
  sortDir: 'desc'
};
let charts = {};

/* ============================================================
   HELPERS
   ============================================================ */
const extractFileNum = (val) => { const m = String(val ?? '').match(/(\d{8})/); return m ? m[1] : null; };
const toNum = (val) => { if (val === null || val === undefined || val === '') return 0; const n = parseFloat(String(val).replace(/[,$\s]/g, '')); return isNaN(n) ? 0 : n; };
const fmt = (n) => (n || 0).toLocaleString('es-PE', { style: 'currency', currency: 'USD', minimumFractionDigits: 2 });
const fmtN = (n) => (n || 0).toLocaleString('es-PE', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const fmtPct = (n) => isFinite(n) ? `${n.toFixed(1)}%` : '—';

// ── Moneda ──────────────────────────────────────────────────────
const MONEDA_USD_RE = /USD|US\$|D[ÓO]LAR(ES)?|DOLLAR|\bDOL\b|\$/i;
const MONEDA_PEN_RE = /\bPEN\b|S\/\.?|SOLES?|\bSOL\b/i;
const detectMoneda = (val) => {
  if (!val) return null;
  const s = String(val).trim();
  if (MONEDA_USD_RE.test(s)) return 'USD';
  if (MONEDA_PEN_RE.test(s)) return 'PEN';
  return null;
};
const monedaBadge = (m) => {
  if (m === 'USD') return '<span class="badge usd">💵 USD</span>';
  if (m === 'PEN') return '<span class="badge pen">S/ PEN</span>';
  return '<span style="color:var(--muted)">—</span>';
};
const BANCO_LIST = [
  { key: 'BCP',              re: /\bBCP\b|CR[ÉE]DITO\s*DEL\s*PER[ÚU]|BANCO\s*DE\s*CR[ÉE]DITO/ },
  { key: 'BBVA',             re: /BBVA|CONTINENTAL/ },
  { key: 'INTERBANK',        re: /INTERBANK|IBK\b/ },
  { key: 'SCOTIABANK',       re: /SCOTIABANK|WIESE/ },
  { key: 'BANCO NACIÓN',     re: /\bBN\b|NACI[ÓO]N/ },
  { key: 'MIBANCO',          re: /MIBANCO/ },
  { key: 'PICHINCHA',        re: /PICHINCHA/ },
  { key: 'BANBIF',           re: /BANBIF/ },
  { key: 'GNB',              re: /\bGNB\b/ },
  { key: 'FINANCIERO',       re: /BANCO\s*FINANCIERO|FINANCIERO/ },
  { key: 'TRANSFERENCIA',    re: /TRANSFER|TRF\b|TRANSF\b/ },
  { key: 'EFECTIVO',         re: /EFECTIVO|CASH/ },
];
const detectBanco = (val) => {
  if (!val) return null;
  const s = String(val).toUpperCase();
  for (const b of BANCO_LIST) { if (b.re.test(s)) return b.key; }
  return null;
};

// Parse Excel/string dates → JS Date
const parseDate = (v) => {
  if (!v) return null;
  if (v instanceof Date && !isNaN(v.getTime())) return v;
  if (typeof v === 'number') {
    // Excel serial date
    const ms = (v - 25569) * 86400000;
    const d = new Date(ms);
    return isNaN(d.getTime()) ? null : d;
  }
  if (typeof v === 'string') {
    const s = v.trim();
    if (!s) return null;
    // DD/MM/YYYY or DD-MM-YYYY
    let m = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
    if (m) {
      let y = parseInt(m[3]); if (y < 100) y += 2000;
      const d = new Date(y, parseInt(m[2]) - 1, parseInt(m[1]));
      return isNaN(d.getTime()) ? null : d;
    }
    // YYYY-MM-DD
    m = s.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
    if (m) {
      const d = new Date(parseInt(m[1]), parseInt(m[2]) - 1, parseInt(m[3]));
      return isNaN(d.getTime()) ? null : d;
    }
    const d = new Date(s);
    return isNaN(d.getTime()) ? null : d;
  }
  return null;
};

const daysBetween = (d1, d2) => {
  if (!d1 || !d2) return null;
  return Math.floor((d2.getTime() - d1.getTime()) / 86400000);
};

const fmtDate = (d) => {
  if (!d) return '—';
  const dd = String(d.getDate()).padStart(2, '0');
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const yy = d.getFullYear();
  return `${dd}/${mm}/${yy}`;
};

const readSheetData = (file) => new Promise((res, rej) => {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const wb = XLSX.read(new Uint8Array(e.target.result), { type: 'array', cellDates: true });
      const ws = wb.Sheets[wb.SheetNames[0]];
      res(XLSX.utils.sheet_to_json(ws, { header: 1, defval: null, raw: false, dateNF: 'yyyy-mm-dd' }));
    } catch (err) { rej(err); }
  };
  reader.onerror = rej;
  reader.readAsArrayBuffer(file);
});

const findHRow = (data, kw) => {
  for (let i = 0; i < Math.min(15, data.length); i++) {
    const row = (data[i] || []).map(c => String(c ?? '').trim().toUpperCase());
    if (kw.every(k => row.some(c => c.includes(k.toUpperCase())))) return i;
  }
  return -1;
};

const findCol = (hdrs, names) => {
  for (const n of names) {
    const i = hdrs.findIndex(h => h.toLowerCase().includes(n.toLowerCase()));
    if (i >= 0) return i;
  }
  return -1;
};

/* ============================================================
   PARSERS
   ============================================================ */
const parseMaestro = (data) => {
  const hRow = findHRow(data, ['FILE', 'TOTAL']);
  if (hRow < 0) return [];
  const hdrs = (data[hRow] || []).map(c => String(c ?? '').trim());
  const fI = findCol(hdrs, ['File']);
  const tI = findCol(hdrs, ['Total']);
  const agI = findCol(hdrs, ['Agencia']);
  const paI = findCol(hdrs, ['Pasajero']);
  const scI = findCol(hdrs, ['Saldo Cobrar', 'Saldo']);
  const neI = findCol(hdrs, ['Neto']);
  const coI = findCol(hdrs, ['Costo']);
  const unI = findCol(hdrs, ['Utilidad']);
  const fcI = findCol(hdrs, ['Fecha', 'Fec']);
  if (fI < 0 || tI < 0) return [];
  return data.slice(hRow + 1)
    .filter(row => row && /^\d{8}$/.test(String(row[fI] ?? '').trim()))
    .map(row => ({
      File_Num: String(row[fI]).trim(),
      Total: toNum(row[tI]),
      Agencia: agI >= 0 ? String(row[agI] ?? '') : '',
      Pasajero: paI >= 0 ? String(row[paI] ?? '') : '',
      SaldoCobrar: scI >= 0 ? toNum(row[scI]) : 0,
      Neto: neI >= 0 ? toNum(row[neI]) : 0,
      Costo: coI >= 0 ? toNum(row[coI]) : 0,
      UtilidadNeta: unI >= 0 ? toNum(row[unI]) : 0,
      FechaMaestro: fcI >= 0 ? parseDate(row[fcI]) : null
    }));
};

const parseIngreso = (data, filename) => {
  let hRow = findHRow(data, ['MONTO', 'FILE']);
  if (hRow < 0) hRow = findHRow(data, ['MONTO', 'RECIBO']);
  if (hRow < 0) {
    for (let i = 0; i < Math.min(8, data.length); i++) {
      const r = (data[i] || []).map(c => String(c ?? '').trim());
      if (r.length >= 2 && r[0] === 'File' && (r[1] === 'Total' || /monto/i.test(r[1]))) { hRow = i; break; }
    }
  }
  if (hRow < 0) return [];
  const hdrs = (data[hRow] || []).map(c => String(c ?? '').trim());
  const monI = (() => { const i = hdrs.findIndex(h => /^monto\s*$/i.test(h.trim())); return i >= 0 ? i : hdrs.findIndex(h => /monto/i.test(h)); })();
  const filI = (() => { const i = hdrs.findIndex(h => /^file$/i.test(h.trim())); return i >= 0 ? i : 0; })();
  const recI = hdrs.findIndex(h => /recibo/i.test(h));
  const fecI = hdrs.findIndex(h => /fecha|fec/i.test(h));
  const conI = hdrs.findIndex(h => /concepto|detalle|descrip|observ/i.test(h));
  const refI = hdrs.findIndex(h => /referencia|ref|banco/i.test(h));
  const agI = hdrs.findIndex(h => /agencia/i.test(h));
  const monedaI = hdrs.findIndex(h => /\bmoneda\b|\bmon\b|\bcurrency\b/i.test(h));
  const bancoI  = hdrs.findIndex(h => /^\s*banco\s*$/i.test(h));
  const seen = new Set();
  const results = [];
  for (let i = hRow + 1; i < data.length; i++) {
    const row = data[i] || [];
    const fileNum = extractFileNum(row[filI]) || (() => { for (const c of row) { const f = extractFileNum(c); if (f) return f; } return null; })();
    if (!fileNum) continue;
    const rawMonto = monI >= 0 ? String(row[monI] ?? '') : '';
    const monto = monI >= 0 ? toNum(row[monI]) : (() => { let best = 0; for (const c of row) { const n = toNum(c); if (n > 0 && n < 2000000) best = n; } return best; })();
    if (monto <= 0) continue;
    const recStr = recI >= 0 ? (String(row[recI] ?? '').match(/(\d+)/)?.[1] || null) : null;
    const key = recStr ? `R${recStr}` : `${fileNum}_${i}_${monto}`;
    if (seen.has(key)) continue;
    seen.add(key);
    const refVal  = refI  >= 0 ? String(row[refI]  ?? '').trim() : '';
    const conVal  = conI  >= 0 ? String(row[conI]  ?? '').trim() : '';
    // Moneda: columna dedicada → raw monto → referencia → concepto
    const moneda  = (monedaI >= 0 ? detectMoneda(row[monedaI]) : null)
                 || detectMoneda(rawMonto)
                 || detectMoneda(refVal)
                 || detectMoneda(conVal)
                 || null;
    // Banco: columna dedicada → referencia → concepto
    const banco   = (bancoI  >= 0 ? (String(row[bancoI] ?? '').trim() || null) : null)
                 || detectBanco(refVal)
                 || detectBanco(conVal)
                 || null;
    results.push({
      File_Num: fileNum,
      Recibo: recStr || '',
      Fecha: fecI >= 0 ? parseDate(row[fecI]) : null,
      Monto: monto,
      Moneda: moneda,
      Banco: banco,
      Concepto: conVal,
      Referencia: refVal,
      Agencia: agI >= 0 ? String(row[agI] ?? '').trim() : '',
      Filename: filename
    });
  }
  return results;
};

const parseEgreso = (data, filename) => {
  const hRow = findHRow(data, ['MONTO']);
  if (hRow < 0) return [];
  const hdrs = (data[hRow] || []).map(c => String(c ?? '').trim());
  const recI = findCol(hdrs, ['Recibo']);
  const monI = findCol(hdrs, ['MONTO', 'Monto']);
  const filI = findCol(hdrs, ['File']);
  const refI = findCol(hdrs, ['Referencia', 'Ref']);
  const fecI = findCol(hdrs, ['Fecha', 'Fec']);
  const conI = findCol(hdrs, ['Concepto', 'Detalle', 'Descrip']);
  const provI = findCol(hdrs, ['Proveedor', 'Beneficiario']);
  const monedaI = hdrs.findIndex(h => /\bmoneda\b|\bmon\b|\bcurrency\b/i.test(h));
  const bancoI  = hdrs.findIndex(h => /^\s*banco\s*$/i.test(h));
  const seen = new Set();
  const results = [];
  for (const row of data.slice(hRow + 1)) {
    if (!row) continue;
    const rec = String(row[recI] ?? '').trim();
    if (!/^\d{5,9}$/.test(rec) || seen.has(rec)) continue;
    seen.add(rec);
    const rawMonto = monI >= 0 ? String(row[monI] ?? '') : '';
    const monto = toNum(row[monI]);
    const fileDesc = filI >= 0 ? String(row[filI] ?? '') : '';
    const fileNum = extractFileNum(fileDesc);
    const refVal = refI >= 0 ? String(row[refI] ?? '').trim() : '';
    const conVal = conI >= 0 ? String(row[conI] ?? '').trim() : '';
    const moneda = (monedaI >= 0 ? detectMoneda(row[monedaI]) : null)
                || detectMoneda(rawMonto)
                || detectMoneda(refVal)
                || detectMoneda(conVal)
                || null;
    const banco  = (bancoI >= 0 ? (String(row[bancoI] ?? '').trim() || null) : null)
                || detectBanco(refVal)
                || detectBanco(conVal)
                || null;
    results.push({
      Recibo: rec,
      File_Num: fileNum,
      Fecha: fecI >= 0 ? parseDate(row[fecI]) : null,
      Monto: monto,
      Moneda: moneda,
      Banco: banco,
      Concepto: conVal,
      Referencia: refVal,
      Proveedor: provI >= 0 ? String(row[provI] ?? '').trim() : '',
      DescripcionFile: fileDesc,
      Filename: filename
    });
  }
  return results;
};

/* ============================================================
   CROSS REFERENCE — Profitability + Aging + Traceability
   ============================================================ */
const crossRef = (maestroArr, ingRows, egRows) => {
  const ingByFile = new Map();
  for (const r of ingRows) {
    if (!ingByFile.has(r.File_Num)) ingByFile.set(r.File_Num, []);
    ingByFile.get(r.File_Num).push(r);
  }
  const egByFile = new Map();
  const egSinFile = [];
  for (const r of egRows) {
    if (!r.File_Num) { egSinFile.push(r); continue; }
    if (!egByFile.has(r.File_Num)) egByFile.set(r.File_Num, []);
    egByFile.get(r.File_Num).push(r);
  }
  const today = new Date();
  today.setHours(0, 0, 0, 0);

  const cruce = maestroArr.map(m => {
    const ings = (ingByFile.get(m.File_Num) || []).slice().sort((a, b) => (a.Fecha?.getTime() || 0) - (b.Fecha?.getTime() || 0));
    const egs = (egByFile.get(m.File_Num) || []).slice().sort((a, b) => (a.Fecha?.getTime() || 0) - (b.Fecha?.getTime() || 0));
    const it = ings.reduce((s, r) => s + r.Monto, 0);
    const et = egs.reduce((s, r) => s + r.Monto, 0);

    // Per-currency breakdown
    const ing_USD = ings.filter(r => r.Moneda === 'USD').reduce((s, r) => s + r.Monto, 0);
    const ing_PEN = ings.filter(r => r.Moneda === 'PEN').reduce((s, r) => s + r.Monto, 0);
    const eg_USD  = egs.filter(r => r.Moneda === 'USD').reduce((s, r) => s + r.Monto, 0);
    const eg_PEN  = egs.filter(r => r.Moneda === 'PEN').reduce((s, r) => s + r.Monto, 0);
    // Predominant moneda for the file
    const monedaFile = ing_USD > ing_PEN ? (ing_USD > 0 ? 'USD' : (ing_PEN > 0 ? 'PEN' : null)) : (ing_PEN > 0 ? 'PEN' : (ing_USD > 0 ? 'USD' : null));

    // Date analysis
    const ingDates = ings.map(r => r.Fecha).filter(Boolean);
    const egDates = egs.map(r => r.Fecha).filter(Boolean);
    const allDates = [...ingDates, ...egDates];
    const firstActivity = allDates.length ? new Date(Math.min(...allDates.map(d => d.getTime()))) : null;
    const lastActivity = allDates.length ? new Date(Math.max(...allDates.map(d => d.getTime()))) : null;
    const lastIng = ingDates.length ? new Date(Math.max(...ingDates.map(d => d.getTime()))) : null;
    const daysSinceFirst = firstActivity ? daysBetween(firstActivity, today) : null;
    const daysSinceLastIng = lastIng ? daysBetween(lastIng, today) : null;

    // Profit
    const profit = it - et;
    const margin = it > 0 ? (profit / it) * 100 : 0;
    const marginVsMaestro = m.Total > 0 ? (profit / m.Total) * 100 : 0;

    // Status
    const dI = it - m.Total;
    const dE = et - m.Total;
    const pend = m.Total - it;
    const eI = it === 0 ? 'SIN INGRESO' : Math.abs(dI) < 0.02 ? 'COMPLETO' : dI > 0 ? 'INGRESO MAYOR' : 'COBRO PARCIAL';
    const eE = et === 0 ? 'SIN EGRESO' : Math.abs(dE) < 0.02 ? 'COMPLETO' : dE > 0 ? 'EGRESO MAYOR' : 'PAGO PARCIAL';
    const eG = eI === 'COMPLETO' ? 'COBRO COMPLETO'
      : eI === 'SIN INGRESO' ? 'PENDIENTE COBRO'
      : eI === 'COBRO PARCIAL' ? 'COBRO PARCIAL'
      : eI === 'INGRESO MAYOR' ? 'EXCEDENTE' : 'REVISAR';

    // Aging bucket based on days since first activity (file age)
    let agingBucket = 'SIN_FECHA';
    if (daysSinceFirst !== null) {
      if (daysSinceFirst <= 30) agingBucket = '0-30';
      else if (daysSinceFirst <= 60) agingBucket = '31-60';
      else if (daysSinceFirst <= 90) agingBucket = '61-90';
      else if (daysSinceFirst <= 180) agingBucket = '91-180';
      else agingBucket = '180+';
    }

    // Criticality score: weighted by pending amount and aging
    let criticidad = 'BAJA';
    let scoreCrit = 0;
    if (pend > 0) {
      // Base score = pending amount
      scoreCrit = pend;
      // Age multiplier
      if (daysSinceFirst !== null) {
        if (daysSinceFirst > 180) scoreCrit *= 3;
        else if (daysSinceFirst > 90) scoreCrit *= 2;
        else if (daysSinceFirst > 60) scoreCrit *= 1.5;
        else if (daysSinceFirst > 30) scoreCrit *= 1.2;
      }
      // No payment activity ever
      if (it === 0) scoreCrit *= 1.5;

      if (scoreCrit > 15000 || (pend > 5000 && (daysSinceFirst === null || daysSinceFirst > 60))) criticidad = 'CRÍTICA';
      else if (scoreCrit > 5000 || (pend > 1000 && (daysSinceFirst === null || daysSinceFirst > 30))) criticidad = 'ALTA';
      else if (pend > 0) criticidad = 'MEDIA';
    }

    // Profit alert
    let alertaRent = 'OK';
    if (it > 0 && et > 0) {
      if (et > it) alertaRent = 'PÉRDIDA';
      else if (margin < 5) alertaRent = 'MARGEN BAJO';
      else if (margin < 15) alertaRent = 'MARGEN MEDIO';
    } else if (et > 0 && it === 0) {
      alertaRent = 'SOLO EGRESOS';
    } else if (it === 0 && et === 0) {
      alertaRent = 'SIN MOVIMIENTOS';
    }

    return {
      ...m,
      Ing_Total: it, Eg_Total: et,
      Dif_Ing: dI, Dif_Eg: dE, Pendiente: pend,
      Est_Ing: eI, Est_Eg: eE, Estado: eG,
      Ganancia: profit, Margen: margin, MargenMaestro: marginVsMaestro,
      PrimeraActividad: firstActivity, UltimaActividad: lastActivity, UltimoIngreso: lastIng,
      DiasDesdeInicio: daysSinceFirst, DiasSinIngreso: daysSinceLastIng,
      AgingBucket: agingBucket, Criticidad: criticidad, ScoreCrit: scoreCrit,
      AlertaRentabilidad: alertaRent,
      Ing_USD: ing_USD, Ing_PEN: ing_PEN, Eg_USD: eg_USD, Eg_PEN: eg_PEN,
      Moneda: monedaFile,
      Ingresos: ings, Egresos: egs,
      NumIngresos: ings.length, NumEgresos: egs.length
    };
  });

  return { cruce, egSinFile };
};

  else if (state.tab === 'cruce') el.innerHTML = renderCruce();

  else if (state.tab === 'criticos') { el.innerHTML = renderCriticos(); renderAgingChart(); }

}

/* ============================================================
   CRUCE COMPLETO
   ============================================================ */
function badgeCls(est) {
  if (est === 'COBRO COMPLETO' || est === 'COMPLETO' || est === 'OK') return 'completo';
  if (est === 'COBRO PARCIAL' || est === 'PAGO PARCIAL' || est === 'MARGEN MEDIO') return 'parcial';
  if (est === 'PENDIENTE COBRO' || est === 'SIN INGRESO' || est === 'SIN EGRESO' || est === 'SIN MOVIMIENTOS') return 'pendiente';
  if (est === 'EXCEDENTE' || est === 'INGRESO MAYOR' || est === 'EGRESO MAYOR') return 'excedente';
  if (est === 'CRÍTICA') return 'critica';
  if (est === 'ALTA') return 'alta';
  if (est === 'MEDIA' || est === 'MARGEN BAJO') return 'media';
  if (est === 'BAJA') return 'baja';
  if (est === 'PÉRDIDA' || est === 'SOLO EGRESOS') return 'perdida';
  return 'revisar';
}

function buildTable(rows, cols, opts = {}) {
  if (!rows.length) return '<p style="color:var(--muted);text-align:center;padding:30px">No hay registros</p>';
  const hdrRow = cols.map(c => `<th onclick="sortBy('${c.key}')">${c.label}${state.sortKey === c.key ? (state.sortDir === 'asc' ? ' ↑' : ' ↓') : ''}</th>`).join('');
  const bodyRows = rows.map(r => `<tr ${opts.clickable ? `onclick="selectFile('${r.File_Num}')"` : ''}>${cols.map(c => {
    const v = r[c.key];
    if (c.type === 'badge') return `<td><span class="badge ${badgeCls(v)}">${v}</span></td>`;
    if (c.type === 'moneda') return `<td>${monedaBadge(v)}</td>`;
    if (c.type === 'num') { const n = toNum(v); return `<td class="num ${n < 0 ? 'neg' : ''}">${n !== 0 ? fmtN(n) : '—'}</td>`; }
    if (c.type === 'profit') { const n = toNum(v); return `<td class="num"><strong style="color:${n < 0 ? 'var(--danger)' : n > 0 ? 'var(--completo)' : 'var(--muted)'}">${fmtN(n)}</strong></td>`; }
    if (c.type === 'pct') { const n = toNum(v); return `<td class="num" style="color:${n < 0 ? 'var(--danger)' : n > 20 ? 'var(--completo)' : 'var(--text)'}">${fmtPct(n)}</td>`; }
    if (c.type === 'pend') { const n = toNum(v); return `<td class="num ${n > 0 ? 'neg' : ''}">${n > 0 ? `<strong>${fmtN(n)}</strong>` : '<span style="color:var(--completo)">✓</span>'}</td>`; }
    if (c.type === 'date') return `<td class="mono">${fmtDate(v)}</td>`;
    if (c.type === 'days') { const n = v; if (n === null || n === undefined) return '<td class="mono" style="color:var(--muted)">—</td>'; const cl = n > 90 ? 'var(--danger)' : n > 60 ? 'var(--alta)' : n > 30 ? 'var(--warn)' : 'var(--muted)'; return `<td class="mono" style="color:${cl}">${n}d</td>`; }
    return `<td class="${c.mono ? 'mono' : ''}" title="${v ?? ''}">${v ?? '—'}</td>`;
  }).join('')}</tr>`).join('');
  return `<table><thead><tr>${hdrRow}</tr></thead><tbody>${bodyRows}</tbody></table>`;
}

  const totalProfit = T('Ganancia');
  const totalIng = T('Ing_Total');

  const avgMargin = totalIng > 0 ? (totalProfit / totalIng * 100) : 0;

  const cols = [

/* ============================================================
   SORTING
   ============================================================ */
function sortBy(key) {
  if (state.sortKey === key) state.sortDir = state.sortDir === 'asc' ? 'desc' : 'asc';
  else { state.sortKey = key; state.sortDir = 'desc'; }
  render();
}
function applySort(rows) {
  if (!state.sortKey) return rows;
  const k = state.sortKey, dir = state.sortDir === 'asc' ? 1 : -1;
  return rows.slice().sort((a, b) => {
    let va = a[k], vb = b[k];
    if (va instanceof Date) va = va.getTime();
    if (vb instanceof Date) vb = vb.getTime();
    if (typeof va === 'string') va = va.toLowerCase();
    if (typeof vb === 'string') vb = vb.toLowerCase();
    if (va === null || va === undefined) return 1;
    if (vb === null || vb === undefined) return -1;
    if (va < vb) return -1 * dir;
    if (va > vb) return 1 * dir;
    return 0;
  });
}

/* ============================================================

   ============================================================ */
function exportExcel() {
  if (!state.result) return;
  const { cruce, egSinFile } = state.result;
  const wb = XLSX.utils.book_new();

  // 1. RESUMEN EJECUTIVO
  const { totals, profitTotals } = state.result;
  const resumen = [
    ['VACACIONATE SAC — RESUMEN EJECUTIVO'],
    [`Generado: ${new Date().toLocaleString('es-PE')}`],
    [],
    ['INDICADOR', 'VALOR'],
    ['Total Files', totals.files],
    ['Total Maestro (USD)', totals.maestro],
    ['Total Ingresos (USD)', totals.ingresos],
    ['Total Egresos (USD)', totals.egresos],
    ['Pendiente de Cobro (USD)', Math.max(0, totals.pendiente)],
    ['Ganancia Total (Ing − Eg)', profitTotals.ganancia],
    ['Margen Promedio %', profitTotals.margenPromedio.toFixed(2)],
    ['Files en Pérdida', profitTotals.filesPerdida],
    ['Files Críticos', profitTotals.filesCriticos],
    ['Files > 90 días', profitTotals.filesAntiguos],
    [],
    ['DISTRIBUCIÓN POR ESTADO', 'CANT'],
    ...Object.entries(state.result.byEstado).map(([k, v]) => [k, v])
  ];
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(resumen), '1.RESUMEN');

  // 2. CRUCE COMPLETO con ganancia
  const cruceCols = ['File_Num', 'Pasajero', 'Agencia', 'Total', 'Ing_Total', 'Eg_Total', 'Pendiente', 'Ganancia', 'Margen', 'MargenMaestro', 'Moneda', 'Ing_USD', 'Ing_PEN', 'Eg_USD', 'Eg_PEN', 'Est_Ing', 'Est_Eg', 'Estado', 'Criticidad', 'AlertaRentabilidad', 'AgingBucket', 'DiasDesdeInicio', 'DiasSinIngreso', 'NumIngresos', 'NumEgresos', 'SaldoCobrar'];
  const cruceHdr = ['FILE', 'PASAJERO', 'AGENCIA', 'TOTAL MAESTRO', 'INGRESOS', 'EGRESOS', 'PENDIENTE', 'GANANCIA', 'MARGEN%', '%MAESTRO', 'MONEDA', 'ING USD', 'ING PEN', 'EG USD', 'EG PEN', 'EST.ING', 'EST.EG', 'ESTADO', 'CRITICIDAD', 'ALERTA RENT', 'AGING', 'DIAS DESDE INICIO', 'DIAS SIN COBRO', '#ING', '#EG', 'SALDO COBRAR'];
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([cruceHdr, ...cruce.map(r => cruceCols.map(k => r[k]))]), '2.CRUCE COMPLETO');

  // 3. TRAZABILIDAD INGRESOS (todos los abonos)
  const ingHdr = ['FILE', 'PASAJERO', 'AGENCIA', 'FECHA', 'RECIBO', 'MONTO', 'MONEDA', 'BANCO', 'CONCEPTO', 'REFERENCIA', 'ARCHIVO ORIGEN'];
  const ingRows = [];
  for (const r of cruce) {
    for (const i of r.Ingresos) {
      ingRows.push([r.File_Num, r.Pasajero, r.Agencia, i.Fecha ? fmtDate(i.Fecha) : '', i.Recibo, i.Monto, i.Moneda || '', i.Banco || '', i.Concepto, i.Referencia, i.Filename]);
    }
  }
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([ingHdr, ...ingRows]), '3.TRAZ INGRESOS');

  // 4. TRAZABILIDAD EGRESOS (todos los pagos)
  const egHdr = ['FILE', 'PASAJERO', 'AGENCIA', 'FECHA', 'RECIBO', 'MONTO', 'MONEDA', 'BANCO', 'CONCEPTO/PROV', 'REFERENCIA', 'ARCHIVO ORIGEN'];
  const egRowsAll = [];
  for (const r of cruce) {
    for (const e of r.Egresos) {
      egRowsAll.push([r.File_Num, r.Pasajero, r.Agencia, e.Fecha ? fmtDate(e.Fecha) : '', e.Recibo, e.Monto, e.Moneda || '', e.Banco || '', e.Concepto || e.Proveedor, e.Referencia, e.Filename]);
    }
  }
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([egHdr, ...egRowsAll]), '4.TRAZ EGRESOS');

  // 5B. BANCOS (nueva hoja)
  const bancoHdr = ['BANCO', 'ING. TRANSACCIONES', 'MONTO INGRESOS', 'EG. TRANSACCIONES', 'MONTO EGRESOS', 'TOTAL MOVIDO'];
  const bancoRows = Object.entries(state.result.byBanco).sort((a,b)=>(b[1].ingMonto+b[1].egMonto)-(a[1].ingMonto+a[1].egMonto))
    .map(([banco, s]) => [banco, s.ingTx, s.ingMonto, s.egTx, s.egMonto, s.ingMonto + s.egMonto]);
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([bancoHdr, ...bancoRows]), '5B.BANCOS');

  // 5C. MONEDAS (nueva hoja)
  const { byMoneda } = state.result;
  const monedaSheet = [
    ['MONEDA', 'ING. TX', 'MONTO INGRESOS', 'EG. TX', 'MONTO EGRESOS'],
    ['USD', byMoneda.USD.ingTx, byMoneda.USD.ing, byMoneda.USD.egTx, byMoneda.USD.eg],
    ['PEN (Soles)', byMoneda.PEN.ingTx, byMoneda.PEN.ing, byMoneda.PEN.egTx, byMoneda.PEN.eg],
    ['Sin moneda', byMoneda.DESCONOCIDA.ingTx, byMoneda.DESCONOCIDA.ing, byMoneda.DESCONOCIDA.egTx, byMoneda.DESCONOCIDA.eg],
  ];
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(monedaSheet), '5C.MONEDAS');

  // 5. CRÍTICOS (sorted by score)
  const critRows = cruce.filter(r => r.Pendiente > 0).sort((a, b) => b.ScoreCrit - a.ScoreCrit);
  const critHdr = ['RANK', 'FILE', 'PASAJERO', 'AGENCIA', 'MAESTRO', 'COBRADO', 'PENDIENTE', 'EDAD DIAS', 'SIN COBRO DIAS', 'AGING', 'CRITICIDAD', 'SCORE'];
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([critHdr, ...critRows.map((r, i) => [i + 1, r.File_Num, r.Pasajero, r.Agencia, r.Total, r.Ing_Total, r.Pendiente, r.DiasDesdeInicio, r.DiasSinIngreso, r.AgingBucket, r.Criticidad, r.ScoreCrit?.toFixed(0)])]), '5.CRITICOS');

  // 6. RENTABILIDAD
  const rentRows = cruce.filter(r => r.Ing_Total > 0 || r.Eg_Total > 0).sort((a, b) => a.Ganancia - b.Ganancia);
  const rentHdr = ['FILE', 'PASAJERO', 'AGENCIA', 'MAESTRO', 'INGRESOS', 'EGRESOS', 'GANANCIA', 'MARGEN%', '%MAESTRO', 'ALERTA'];
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([rentHdr, ...rentRows.map(r => [r.File_Num, r.Pasajero, r.Agencia, r.Total, r.Ing_Total, r.Eg_Total, r.Ganancia, r.Margen?.toFixed(2), r.MargenMaestro?.toFixed(2), r.AlertaRentabilidad])]), '6.RENTABILIDAD');

  // 7. PÉRDIDAS (egreso > ingreso)
  const perd = cruce.filter(r => r.AlertaRentabilidad === 'PÉRDIDA' || r.AlertaRentabilidad === 'SOLO EGRESOS').sort((a, b) => a.Ganancia - b.Ganancia);
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([rentHdr, ...perd.map(r => [r.File_Num, r.Pasajero, r.Agencia, r.Total, r.Ing_Total, r.Eg_Total, r.Ganancia, r.Margen?.toFixed(2), r.MargenMaestro?.toFixed(2), r.AlertaRentabilidad])]), '7.PERDIDAS');

  // 8. COMPLETOS
  const compRows = cruce.filter(r => r.Estado === 'COBRO COMPLETO').sort((a, b) => b.Total - a.Total);
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([cruceHdr, ...compRows.map(r => cruceCols.map(k => r[k]))]), '8.COMPLETOS');

  // 9. PENDIENTES
  const pendRows = cruce.filter(r => ['PENDIENTE COBRO', 'COBRO PARCIAL'].includes(r.Estado)).sort((a, b) => b.Pendiente - a.Pendiente);
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([cruceHdr, ...pendRows.map(r => cruceCols.map(k => r[k]))]), '9.PENDIENTES');

  // 10. EGRESOS SIN FILE
  if (egSinFile.length) {
    const sfHdr = ['RECIBO', 'FECHA', 'REFERENCIA', 'CONCEPTO/PROV', 'MONTO', 'ARCHIVO'];
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([sfHdr, ...egSinFile.map(r => [r.Recibo, r.Fecha ? fmtDate(r.Fecha) : '', r.Referencia, r.Concepto || r.Proveedor, r.Monto, r.Filename])]), '10.EG SIN FILE');
  }

  XLSX.writeFile(wb, 'INFORME_CONTROLLER_VACACIONATE_' + new Date().toISOString().slice(0, 10) + '.xlsx');
}

/* ============================================================
   HTML EXPORT — Standalone dynamic dashboard with embedded data
   ============================================================ */
function exportHTML() {
  if (!state.result) return;
  // Strip the heavy nested Ingresos/Egresos arrays into a compact form
  const compact = {
    cruce: state.result.cruce.map(r => ({
      File_Num: r.File_Num, Pasajero: r.Pasajero, Agencia: r.Agencia,
      Total: r.Total, Ing_Total: r.Ing_Total, Eg_Total: r.Eg_Total,
      Pendiente: r.Pendiente, Ganancia: r.Ganancia, Margen: r.Margen, MargenMaestro: r.MargenMaestro,
      Est_Ing: r.Est_Ing, Est_Eg: r.Est_Eg, Estado: r.Estado,
      Criticidad: r.Criticidad, AlertaRentabilidad: r.AlertaRentabilidad, AgingBucket: r.AgingBucket,
      DiasDesdeInicio: r.DiasDesdeInicio, DiasSinIngreso: r.DiasSinIngreso,
      PrimeraActividad: r.PrimeraActividad ? r.PrimeraActividad.toISOString() : null,
      UltimaActividad: r.UltimaActividad ? r.UltimaActividad.toISOString() : null,
      UltimoIngreso: r.UltimoIngreso ? r.UltimoIngreso.toISOString() : null,
      NumIngresos: r.NumIngresos, NumEgresos: r.NumEgresos,
      Ingresos: r.Ingresos.map(i => ({ Recibo: i.Recibo, Fecha: i.Fecha ? i.Fecha.toISOString() : null, Monto: i.Monto, Concepto: i.Concepto, Referencia: i.Referencia })),
      Egresos: r.Egresos.map(e => ({ Recibo: e.Recibo, Fecha: e.Fecha ? e.Fecha.toISOString() : null, Monto: e.Monto, Concepto: e.Concepto || e.Proveedor, Referencia: e.Referencia }))
    })),
    totals: state.result.totals,
    byEstado: state.result.byEstado,
    profitTotals: state.result.profitTotals,
    generatedAt: new Date().toISOString()
  };
  const dataStr = JSON.stringify(compact);
  const html = buildStandaloneReport(dataStr);
  const blob = new Blob([html], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'DASHBOARD_VACACIONATE_' + new Date().toISOString().slice(0, 10) + '.html';
  a.click();
  URL.revokeObjectURL(url);
}

<div class="header"><div class="logo">V</div><div><div style="font-size:16px;font-weight:700">Vacacionate SAC — Dashboard Dinámico</div><div style="font-size:11px;color:var(--muted)">Reporte exportado · Datos embebidos · Sin necesidad de re-cargar archivos</div></div><div style="margin-left:auto;font-size:12px;color:var(--muted);font-family:'Space Mono'" id="gen-date"></div></div>

<script>
const DATA = ${dataStr};
let cur = 'dash', filter='ALL', search='', sortKey=null, sortDir='desc';
let chartObjs = {};
const fmt = (n)=>(n||0).toLocaleString('es-PE',{style:'currency',currency:'USD',minimumFractionDigits:2});
const fmtN = (n)=>(n||0).toLocaleString('es-PE',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtPct = (n)=>isFinite(n)?n.toFixed(1)+'%':'—';
const fmtDate = (s)=>{ if(!s)return'—'; const d=new Date(s); return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();};
const badgeCls = (e)=>{if(['COBRO COMPLETO','COMPLETO','OK'].includes(e))return'completo';if(['COBRO PARCIAL','PAGO PARCIAL','MARGEN MEDIO'].includes(e))return'parcial';if(['PENDIENTE COBRO','SIN INGRESO','SIN MOVIMIENTOS'].includes(e))return'pendiente';if(['EXCEDENTE','INGRESO MAYOR'].includes(e))return'excedente';if(e==='CRÍTICA')return'critica';if(e==='ALTA')return'alta';if(['MEDIA','MARGEN BAJO'].includes(e))return'media';if(e==='BAJA')return'baja';if(['PÉRDIDA','SOLO EGRESOS'].includes(e))return'perdida';return'';};

'</div>'+
'<div class="kpi-grid" style="grid-template-columns:repeat(4,1fr)">'+
'<div class="kpi-card green"><div class="kpi-label">Margen Promedio</div><div class="kpi-value">'+fmtPct(p.margenPromedio)+'</div></div>'+
'<div class="kpi-card red"><div class="kpi-label">Files Pérdida</div><div class="kpi-value">'+p.filesPerdida+'</div></div>'+
'<div class="kpi-card orange"><div class="kpi-label">Files Críticos</div><div class="kpi-value">'+p.filesCriticos+'</div></div>'+
'<div class="kpi-card purple"><div class="kpi-label">Aging > 90d</div><div class="kpi-value">'+p.filesAntiguos+'</div></div>'+

/* ============================================================
   EVENTS / WIRING
   ============================================================ */
function showError(msg) { const el = document.getElementById('error-msg'); if (el) el.innerHTML = `<div class="error-msg">⚠ ${msg}</div>`; }
function setLoading(v) { const btn = document.getElementById('analyze-btn'), lm = document.getElementById('loading-msg'); if (btn) btn.disabled = v; if (lm) lm.innerHTML = v ? '<div class="loading-indicator"><span class="spinner"></span>Analizando archivos, por favor espera...</div>' : ''; }
function enableTabs() { document.querySelectorAll('.tab').forEach(t => t.classList.remove('disabled')); }
function switchTab(tab) { state.tab = tab; state.sortKey = null; document.querySelectorAll('.tab').forEach(t => { t.classList.toggle('active', t.dataset.tab === tab); }); render(); }
function updateSearch(v) { state.search = v; render(); setTimeout(() => { const s = document.querySelector('.search-input'); if (s) { s.focus(); s.setSelectionRange(s.value.length, s.value.length); } }, 0); }
function updateSearchTraz(v) { state.search = v; render(); setTimeout(() => { const s = document.querySelector('.search-input'); if (s) { s.focus(); s.setSelectionRange(s.value.length, s.value.length); } }, 0); }
function updateFilter(v) { state.filter = v; render(); }
function selectFile(fn) { state.selectedFile = fn; state.tab = 'trazabilidad'; document.querySelectorAll('.tab').forEach(t => { t.classList.toggle('active', t.dataset.tab === 'trazabilidad'); }); render(); }
function onFileInput(cat, input) { const files = Array.from(input.files); if (!files.length) return; if (cat === 'maestro') state.files.maestro = files[0]; else state.files[cat] = [...state.files[cat], ...files]; input.value = ''; render(); }
function removeFile(cat, idx) { if (cat === 'maestro') state.files.maestro = null; else state.files[cat] = state.files[cat].filter((_, i) => i !== idx); render(); }

const analyze = async () => {
  const { files } = state;
  if (!files.maestro) { showError('Por favor carga el archivo Maestro'); return; }
  if (!files.ingresos.length) { showError('Por favor carga al menos un archivo de Ingresos'); return; }
  if (!files.egresos.length) { showError('Por favor carga al menos un archivo de Egresos'); return; }
  setLoading(true);
  try {
    const mData = await readSheetData(files.maestro);
    const maestroArr = parseMaestro(mData);
    if (!maestroArr.length) throw new Error('No se pudo leer el archivo Maestro. Verifica que tenga columnas "File" y "Total".');
    const ingRows = [];
    for (const f of files.ingresos) { const d = await readSheetData(f); ingRows.push(...parseIngreso(d, f.name)); }
    const egRows = [];
    for (const f of files.egresos) { const d = await readSheetData(f); egRows.push(...parseEgreso(d, f.name)); }
    // Dedupe egresos by Recibo
    const egSeen = new Set();
    const egUniq = egRows.filter(r => { if (egSeen.has(r.Recibo)) return false; egSeen.add(r.Recibo); return true; });
    const { cruce, egSinFile } = crossRef(maestroArr, ingRows, egUniq);
    const T = (k) => cruce.reduce((s, r) => s + (r[k] || 0), 0);
    const conIng = cruce.filter(r => r.Ing_Total > 0);
    const margenPromedio = conIng.length ? conIng.reduce((s, r) => s + r.Margen, 0) / conIng.length : 0;

    // Currency aggregation
    const allIngTx = cruce.flatMap(r => r.Ingresos);
    const allEgTx  = cruce.flatMap(r => r.Egresos);
    const byMoneda = {
      USD: {
        ing: allIngTx.filter(r => r.Moneda === 'USD').reduce((s, r) => s + r.Monto, 0),
        eg:  allEgTx.filter(r => r.Moneda === 'USD').reduce((s, r) => s + r.Monto, 0),
        ingTx: allIngTx.filter(r => r.Moneda === 'USD').length,
        egTx:  allEgTx.filter(r => r.Moneda === 'USD').length,
      },
      PEN: {
        ing: allIngTx.filter(r => r.Moneda === 'PEN').reduce((s, r) => s + r.Monto, 0),
        eg:  allEgTx.filter(r => r.Moneda === 'PEN').reduce((s, r) => s + r.Monto, 0),
        ingTx: allIngTx.filter(r => r.Moneda === 'PEN').length,
        egTx:  allEgTx.filter(r => r.Moneda === 'PEN').length,
      },
      DESCONOCIDA: {
        ing: allIngTx.filter(r => !r.Moneda).reduce((s, r) => s + r.Monto, 0),
        eg:  allEgTx.filter(r => !r.Moneda).reduce((s, r) => s + r.Monto, 0),
        ingTx: allIngTx.filter(r => !r.Moneda).length,
        egTx:  allEgTx.filter(r => !r.Moneda).length,
      }
    };
    // Bank aggregation (transactions with a detected bank)
    const byBanco = {};
    for (const tx of allIngTx) {
      const b = tx.Banco || 'SIN BANCO';
      if (!byBanco[b]) byBanco[b] = { ingTx: 0, egTx: 0, ingMonto: 0, egMonto: 0 };
      byBanco[b].ingTx++;
      byBanco[b].ingMonto += tx.Monto;
    }
    for (const tx of allEgTx) {
      const b = tx.Banco || 'SIN BANCO';
      if (!byBanco[b]) byBanco[b] = { ingTx: 0, egTx: 0, ingMonto: 0, egMonto: 0 };
      byBanco[b].egTx++;
      byBanco[b].egMonto += tx.Monto;
    }
    state.result = {
      cruce, egSinFile,
      totals: { files: cruce.length, maestro: T('Total'), ingresos: T('Ing_Total'), egresos: T('Eg_Total'), pendiente: T('Pendiente'), saldoCobrar: T('SaldoCobrar') },
      profitTotals: {
        ganancia: T('Ganancia'),
        margenPromedio,
        filesPerdida: cruce.filter(r => r.AlertaRentabilidad === 'PÉRDIDA').length,
        filesCriticos: cruce.filter(r => r.Criticidad === 'CRÍTICA').length,
        filesAntiguos: cruce.filter(r => ['91-180', '180+'].includes(r.AgingBucket)).length
      },
      byEstado: cruce.reduce((acc, r) => { acc[r.Estado] = (acc[r.Estado] || 0) + 1; return acc; }, {}),
      byEstIng: cruce.reduce((acc, r) => { acc[r.Est_Ing] = (acc[r.Est_Ing] || 0) + 1; return acc; }, {}),
      byMoneda,
      byBanco
    };
    setLoading(false);
    enableTabs();
    switchTab('dashboard');
  } catch (err) {
    setLoading(false);
    showError(err.message);
    console.error(err);
  }
};

document.querySelectorAll('.tabs .tab').forEach(t => { t.onclick = () => { if (!t.classList.contains('disabled')) switchTab(t.dataset.tab); }; });
render();
</script>
